<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Springwala Admin | Login</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F4F6F6;
            /* Background from Figma */
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Container -->
    <div
        class="bg-white rounded-[10px] shadow-[0px_4px_4px_rgba(0,0,0,0.25)] w-full max-w-[555px] flex flex-col items-center relative py-12 px-5 sm:px-10 my-6">

        <!-- Logo -->
        <div class="w-full flex justify-center mb-[20px]">
            <img src="assets/images/header.png" alt="Springwala Horizontal Logo"
                class="w-[260px] max-w-[80%] h-[60px] object-contain">
        </div>

        <!-- Horizontal Line -->
        <div class="w-full max-w-[526px] h-[1px] bg-black/15 mb-[40px] sm:mb-[50px]"></div>

        <!-- Robot Icon -->
        <div class="w-[140px] h-[140px] flex items-center justify-center shrink-0 mb-[15px]">
            <img src="assets/images/welcome.png" alt="Admin Bot" class="w-full h-full object-contain">
        </div>

        <!-- Admin Login Text -->
        <h2 class="font-normal text-[24px] leading-[36px] text-black mb-[35px]">
            Admin Login
        </h2>

        <!-- Form Section -->
        <form id="admin-login-form" class="w-full flex flex-col items-center flex-1 w-full max-w-[365px]"
            onsubmit="event.preventDefault(); window.location.href='public/admin.html';">

            <!-- Email Input -->
            <div class="w-full mb-[13px]">
                <input type="text" placeholder="Admin User ID" required
                    class="w-full h-[52px] bg-[#EDEDED] rounded-[8px] px-4 sm:px-5 py-4 text-[14px] sm:text-[16px] leading-[24px] text-black font-['Poppins'] placeholder-black/40 outline-none focus:ring-2 focus:ring-[#BE2229] transition">
            </div>

            <!-- Password Input -->
            <div class="w-full relative mb-[30px]">
                <input type="password" id="password" placeholder="Admin Password" required
                    class="w-full h-[52px] bg-[#EDEDED] rounded-[8px] pl-4 sm:pl-5 pr-[45px] sm:pr-12 py-4 text-[14px] sm:text-[16px] leading-[24px] text-black font-['Poppins'] placeholder-black/40 outline-none focus:ring-2 focus:ring-[#BE2229] transition">
                <button type="button" id="toggle-password"
                    class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 outline-none">
                    <img src="assets/icons/admin/eye.svg" id="eye-icon" alt="Toggle Password"
                        class="w-[20px] sm:w-[22px] h-[20px] sm:h-[22px] opacity-70 hover:opacity-100 transition cursor-pointer bg-transparent border-none">
                </button>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full h-[40px] bg-[#BE2229] hover:bg-red-800 text-white font-semibold text-[16px] leading-[24px] rounded-[5px] flex items-center justify-center transition cursor-pointer border-none outline-none">
                Login
            </button>
        </form>

    </div>

    <!-- Interactive Scripts -->
    <script>
        // Password Toggle Script
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOpenSrc = 'assets/icons/admin/eye.svg';
        const eyeClosedSrc = 'assets/icons/admin/eye-closed.svg';

        togglePassword.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.src = eyeClosedSrc;
            } else {
                passwordInput.type = 'password';
                eyeIcon.src = eyeOpenSrc;
            }
        });
    </script>
</body>

</html>
