<!DOCTYPE html>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F4F6F6;
            font-family: 'Poppins', sans-serif;
        }

        /* Auto Slider CSS Animation */
        .slide {
            opacity: 0;
            transition: opacity 1s ease-in-out;
            position: absolute;
            inset: 0;
        }

        .slide.active {
            opacity: 1;
            z-index: 10;
        }

        .indicator {
            width: 24px;
            height: 4px;
            border-radius: 9999px;
            background-color: #D9D9D9;
            transition: all 0.3s;
            cursor: pointer;
        }

        .indicator.active {
            background-color: #625656;
        }

        /* Ensures the container fits on smaller latpop screens without scrolling body */
        .responsive-container {
            width: 100%;
            max-width: 1110px;
            /* Allow it to shrink to fit the screen vertically */
            height: calc(100vh - 40px);
            max-height: 743px;
        }

        /* Mobile specific overrides */
        @media (max-width: 1023px) {
            .responsive-container {
                max-width: 428px;
                height: calc(100vh - 32px);
                max-height: 900px;
            }
        }

        /* Hide scrollbar for auth panels but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

    <!-- Auto Slider JavaScript for Desktop View -->
    <script>
        function slideAuth(index) {
            const authSlider = document.getElementById('auth-slider');
            const imagePanel = document.getElementById('slider-container');
            const formPanel = document.getElementById('form-container');

            if (authSlider) {
                const percentage = -(index * 33.333333);
                authSlider.style.transform = `translateX(${percentage}%)`;
            }

            // Desktop Panel Swap Logic (Only on screens >= 1024px)
            if (window.innerWidth >= 1024) {
                // Swap panels only for Register (index 1)
                if (index === 1) {
                    if (imagePanel && formPanel) {
                        imagePanel.style.transform = 'translateX(100%)';
                        formPanel.style.transform = 'translateX(-100%)';
                    }
                } else {
                    // Reset to original positions for Login and Forgot Password
                    if (imagePanel && formPanel) {
                        imagePanel.style.transform = 'translateX(0)';
                        formPanel.style.transform = 'translateX(0)';
                    }
                }
            } else {
                // For mobile, ensure they are reset
                if (imagePanel && formPanel) {
                    imagePanel.style.transform = 'none';
                    formPanel.style.transform = 'none';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const indicators = document.querySelectorAll('.indicator');
            let currentSlide = 0;
            const slideInterval = 4000; // 4 seconds per slide
            let slideTimer;

            function goToSlide(index) {
                if (!slides.length) return;
                // Remove active classes
                slides[currentSlide].classList.remove('active');
                indicators[currentSlide].classList.remove('active');

                // Update specific index
                currentSlide = index;

                // Add active to new state
                slides[currentSlide].classList.add('active');
                indicators[currentSlide].classList.add('active');
            }

            function nextSlide() {
                let nextIndex = (currentSlide + 1) % slides.length;
                goToSlide(nextIndex);
            }

            function startSlider() {
                if (slides.length > 0) {
                    slideTimer = setInterval(nextSlide, slideInterval);
                }
            }

            // Click listener for pagination indicators
            indicators.forEach(indicator => {
                indicator.addEventListener('click', (e) => {
                    const slideIndex = parseInt(e.target.getAttribute('data-slide'));
                    clearInterval(slideTimer); // pause automated timer
                    goToSlide(slideIndex);
                    startSlider(); // restart automated timer
                });
            });

            // Start automated logic
            startSlider();

            // Password Eye Toggle Functionality Helper
            function setupPasswordToggle(btnId, inputId, iconId) {
                const btn = document.getElementById(btnId);
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);

                const eyeSlashSVG = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/><path d="M2.71 3.16c-.39.39-.39 1.02 0 1.41l16.32 16.33c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L4.12 3.16c-.39-.39-1.02-.39-1.41 0z" fill="gray"/>';
                const eyeSVG = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />';

                if (btn && input && icon) {
                    btn.addEventListener('click', function (e) {
                        e.preventDefault();
                        const isPassword = input.getAttribute('type') === 'password';
                        input.setAttribute('type', isPassword ? 'text' : 'password');
                        btn.style.opacity = isPassword ? '1' : '0.5';
                        icon.innerHTML = isPassword ? eyeSlashSVG : eyeSVG;
                    });
                }
            }

            setupPasswordToggle('togglePasswordBtn', 'passwordInput', 'eyeIcon');
            setupPasswordToggle('toggleRegPasswordBtn', 'regPasswordInput', 'eyeIconReg');
            setupPasswordToggle('toggleRegConfirmBtn', 'regConfirmPasswordInput', 'eyeIconRegConf');
        });
    </script>
