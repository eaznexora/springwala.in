<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Springwala</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F4F6F6;
            font-family: 'Poppins', sans-serif;
        }

        /* Auto Slider CSS Animation */
        .slide {
            opacity: 0;
            transition: opacity 1s ease-in-out;
            position: absolute;
            inset: 0;
        }

        .slide.active {
            opacity: 1;
            z-index: 10;
        }

        .indicator {
            width: 24px;
            height: 4px;
            border-radius: 9999px;
            background-color: #D9D9D9;
            transition: all 0.3s;
            cursor: pointer;
        }

        .indicator.active {
            background-color: #625656;
        }

        /* Ensures the container fits on smaller latpop screens without scrolling body */
        .responsive-container {
            width: 100%;
            max-width: 1110px;
            /* Allow it to shrink to fit the screen vertically */
            height: calc(100vh - 40px);
            max-height: 743px;
        }

        /* Mobile specific overrides */
        @media (max-width: 1023px) {
            .responsive-container {
                max-width: 428px;
                height: 100vh;
                /* Full screen on mobile */
                max-height: none;
            }
        }
    </style>
</head>

<body class="bg-[#F4F6F6] min-h-screen flex items-center justify-center p-0 md:p-5 relative w-full overflow-hidden">

    <!-- Overall Responsive Container -->
    <div
        class="responsive-container bg-white rounded-none md:rounded-[10px] shadow-none md:shadow-[0px_4px_13.3px_rgba(0,0,0,0.25)] flex flex-col lg:flex-row overflow-hidden relative">

        <!-- Desktop Slider Panel (Left Side - 50%) -->
        <div class="hidden lg:block w-1/2 bg-[#E6E6E6] relative overflow-hidden" id="slider-container">
            <!-- Slider Images layer -->
            <div id="slider" class="w-full h-full relative">
                <!-- Slide 1 -->
                <div class="slide active bg-cover bg-center"
                    style="background-image: url('assets/images/header.png'); background-color: #E6E6E6;"></div>
                <!-- Slide 2 -->
                <div class="slide bg-cover bg-center"
                    style="background-image: url('assets/images/header-logo.png'); background-color: #D9D9D9; background-size: contain; background-repeat: no-repeat;">
                </div>
                <!-- Slide 3 -->
                <div class="slide bg-cover bg-center"
                    style="background-image: url('assets/images/oops.png'); background-color: #F0F0F0; background-size: contain; background-repeat: no-repeat;">
                </div>
            </div>

            <!-- Slider Pagination Indicators -->
            <div class="absolute bottom-[38px] left-1/2 -translate-x-1/2 flex items-center gap-[6px] z-20"
                id="slider-indicators">
                <div class="indicator active" data-slide="0"></div>
                <div class="indicator" data-slide="1"></div>
                <div class="indicator" data-slide="2"></div>
            </div>
        </div>

        <!-- Right Side Panel (Form Content - 100% Mobile, 50% Desktop) -->
        <div
            class="w-full lg:w-1/2 bg-white flex flex-col items-center justify-center py-[20px] px-[20px] lg:px-[40px] relative h-full overflow-y-auto overflow-x-hidden">

            <!-- Inner Form Wrapper (Max 365px exactly like Figma design) -->
            <div class="w-full max-w-[365px] flex flex-col items-center flex-1 justify-center my-auto min-h-min">

                <!-- Robot Mascot -->
                <div
                    class="w-[120px] h-[120px] lg:w-[140px] lg:h-[140px] rounded-full mx-auto flex items-center justify-center overflow-hidden bg-white mb-[15px] lg:mb-[25px] flex-shrink-0">
                    <img src="assets/images/welcome.png" alt="Welcome Robo"
                        class="w-full h-full object-cover rounded-full border border-gray-100">
                </div>

                <!-- Welcome Text -->
                <h1
                    class="text-[#000000] text-[22px] lg:text-[24px] font-normal leading-[1.3] text-center mb-[20px] lg:mb-[30px] flex-shrink-0">
                    Welcome Back!
                </h1>

                <!-- Inputs Sequence -->
                <div class="w-full flex flex-col gap-[10px] lg:gap-[12px] flex-shrink-0">
                    <!-- Email / Phone Input -->
                    <div class="w-full h-[55px] bg-[#EDEDED] rounded-[8px] flex items-center px-[20px]">
                        <input type="text" placeholder="Enter Your Email or Phone Number"
                            class="w-full bg-transparent border-none outline-none text-[15px] lg:text-[16px] text-[#000000] font-['Poppins'] placeholder-black placeholder-opacity-40">
                    </div>

                    <!-- Password Input -->
                    <div class="w-full h-[55px] bg-[#EDEDED] rounded-[8px] flex items-center px-[20px] relative">
                        <input type="password" id="passwordInput" placeholder="Enter Password"
                            class="w-full bg-transparent border-none outline-none text-[15px] lg:text-[16px] text-[#000000] font-['Poppins'] placeholder-black placeholder-opacity-40 pr-[40px]">
                        <!-- Toggle Password Eye Button -->
                        <button type="button" id="togglePasswordBtn"
                            class="absolute right-[16px] text-black opacity-50 hover:opacity-100 transition p-2 cursor-pointer flex items-center justify-center bg-transparent border-none">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Forgot Password -->
                <div class="w-full mt-[10px] mb-[20px] lg:mb-[30px] text-center pl-[5px] flex-shrink-0">
                    <a href="#" class="text-[#BE2229] text-[12px] font-normal leading-[18px] underline">Forgot
                        Password?</a>
                </div>

                <!-- Action Buttons Sequence -->
                <div class="w-full flex flex-col gap-[8px] lg:gap-[10px] flex-shrink-0">

                    <!-- Login Button -->
                    <button
                        class="w-full h-[40px] bg-[#BE2229] rounded-[5px] flex items-center justify-center text-[#FFFFFF] text-[15px] lg:text-[16px] font-semibold leading-[24px] hover:bg-red-800 transition shadow-sm">
                        Login
                    </button>

                    <!-- Continue as Guest -->
                    <a href="index.html"
                        class="w-full h-[40px] bg-[#EDEDED] border border-[#DADADA] rounded-[5px] flex items-center justify-center text-[#474747] text-[15px] lg:text-[16px] font-semibold leading-[24px] hover:bg-[#e0e0e0] transition shadow-sm">
                        Continue as Guest
                    </a>

                    <!-- Sign in with Google -->
                    <button
                        class="w-full h-[40px] bg-[#FFFFFF] border border-[#DADADA] rounded-[5px] flex items-center justify-center gap-[10px] text-[#474747] text-[15px] lg:text-[16px] font-semibold leading-[24px] hover:bg-gray-50 transition shadow-sm">
                        <svg width="20" height="21" viewBox="0 0 20 21" fill="none">
                            <path
                                d="M19.6059 10.7412C19.6059 10.0381 19.5428 9.35914 19.4239 8.70526H10.0059V12.5516H15.3853C15.1537 13.7947 14.4442 14.8516 13.3884 15.5589V18.0611H16.6231C18.5173 16.3195 19.6059 13.7663 19.6059 10.7412Z"
                                fill="#4285F4" />
                            <path
                                d="M10.0059 20.5284C12.7048 20.5284 14.9748 19.6337 16.6231 18.0611L13.3884 15.5589C12.4968 16.1568 11.3526 16.5116 10.0059 16.5116C7.40484 16.5116 5.19747 14.7558 4.4101 12.3958H1.06696V14.9853C2.71538 18.2611 6.10801 20.5284 10.0059 20.5284Z"
                                fill="#34A853" />
                            <path
                                d="M4.41009 12.3958C4.20857 11.7916 4.09536 11.1495 4.09536 10.4916C4.09536 9.83368 4.20857 9.19158 4.41009 8.58737V5.99789H1.06695C0.388005 7.35158 0 8.87789 0 10.4916C0 12.1053 0.388005 13.6316 1.06695 14.9853L4.41009 12.3958Z"
                                fill="#FBBC05" />
                            <path
                                d="M10.0059 4.47158C11.4748 4.47158 12.7906 4.97684 13.8275 5.96526L16.6943 3.09842C14.9696 1.49158 12.6996 0.454735 10.0059 0.454735C6.10801 0.454735 2.71538 2.72211 1.06696 5.99789L4.4101 8.58737C5.19747 6.22737 7.40484 4.47158 10.0059 4.47158Z"
                                fill="#EA4335" />
                        </svg>
                        Sign in with Google
                    </button>

                    <!-- New User / Register -->
                    <div class="text-center mt-[8px]">
                        <span class="text-[#000000] text-[12px] font-normal leading-[18px]">New User? </span>
                        <a href="register.html"
                            class="text-[#BE2229] text-[12px] font-normal leading-[18px] underline">Register Now!</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Auto Slider JavaScript for Desktop View -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const indicators = document.querySelectorAll('.indicator');
            let currentSlide = 0;
            const slideInterval = 4000; // 4 seconds per slide
            let slideTimer;

            function goToSlide(index) {
                if (!slides.length) return;
                // Remove active classes
                slides[currentSlide].classList.remove('active');
                indicators[currentSlide].classList.remove('active');

                // Update specific index
                currentSlide = index;

                // Add active to new state
                slides[currentSlide].classList.add('active');
                indicators[currentSlide].classList.add('active');
            }

            function nextSlide() {
                let nextIndex = (currentSlide + 1) % slides.length;
                goToSlide(nextIndex);
            }

            function startSlider() {
                if (slides.length > 0) {
                    slideTimer = setInterval(nextSlide, slideInterval);
                }
            }

            // Click listener for pagination indicators
            indicators.forEach(indicator => {
                indicator.addEventListener('click', (e) => {
                    const slideIndex = parseInt(e.target.getAttribute('data-slide'));
                    clearInterval(slideTimer); // pause automated timer
                    goToSlide(slideIndex);
                    startSlider(); // restart automated timer
                });
            });

            // Start automated logic
            startSlider();

            // Password Eye Toggle Functionality
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');

            // Eye slash SVG content for visibility toggled state
            const eyeSlashSVG = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/><path d="M2.71 3.16c-.39.39-.39 1.02 0 1.41l16.32 16.33c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L4.12 3.16c-.39-.39-1.02-.39-1.41 0z" fill="gray"/>';
            const eyeSVG = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />';

            if (togglePasswordBtn && passwordInput) {
                togglePasswordBtn.addEventListener('click', function (e) {
                    e.preventDefault(); // Stop forms if it happens to be wrapped
                    const isPassword = passwordInput.getAttribute('type') === 'password';

                    // Toggle the input type attribute
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

                    // Toggle the button opacity 
                    togglePasswordBtn.style.opacity = isPassword ? '1' : '0.5';

                    // Toggle SVG from plain eye to slashed eye
                    eyeIcon.innerHTML = isPassword ? eyeSlashSVG : eyeSVG;
                });
            }
        });
    </script>
</body>

</html>
